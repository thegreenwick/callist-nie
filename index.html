<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Callisthénie" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <title>Callisthénie — Programme 2026</title>
  <style>
    :root {
      --bg: #0b0b0d;
      --card: #151519;
      --card-2: #1d1d23;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --line: #2a2a32;
      --accent: #ffffff;
      --ok: #d4d4d8;
      --danger: #ef4444;
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      padding: 18px;
      padding-bottom: calc(18px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding-top: env(safe-area-inset-top);
    }

    h1 {
      font-size: 18px;
      line-height: 1.1;
      margin: 0;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .progressText {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .progressBar {
      height: 6px;
      width: 100%;
      background: var(--card-2);
      border-radius: 999px;
      overflow: hidden;
    }

    .progressFill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.25s ease;
    }

    .card {
      background: linear-gradient(180deg, var(--card), #101014);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.28);
    }

    .section {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 16px;
    }

    .exercise {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin: 0 0 14px;
      min-height: 76px;
      display: flex;
      align-items: center;
    }

    .meta {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
      min-height: 44px;
      margin-bottom: 20px;
    }

    .timer {
      font-size: clamp(74px, 22vw, 110px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.08em;
      text-align: center;
      margin: 24px 0 14px;
      font-variant-numeric: tabular-nums;
    }

    .repBox {
      display: none;
      margin: 26px 0 18px;
      text-align: center;
    }

    .repCount {
      font-size: 46px;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }

    .repLabel {
      color: var(--muted);
      font-size: 15px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 16px 14px;
      font-size: 16px;
      font-weight: 750;
      color: var(--bg);
      background: var(--accent);
      cursor: pointer;
      min-height: 54px;
    }

    button.secondary {
      background: var(--card-2);
      color: var(--text);
      border: 1px solid var(--line);
    }

    button.ghost {
      grid-column: 1 / -1;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    button.danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.35);
    }

    .smallGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .smallGrid button {
      font-size: 13px;
      padding: 12px 8px;
      min-height: 44px;
      border-radius: 13px;
    }

    .next {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .next strong {
      display: block;
      color: var(--text);
      font-size: 15px;
      margin-top: 3px;
    }

    .doneScreen {
      display: none;
      text-align: center;
      padding: 36px 24px;
    }

    .doneScreen h2 {
      font-size: 32px;
      letter-spacing: -0.04em;
      margin: 0 0 12px;
    }

    .doneScreen p {
      color: var(--muted);
      margin: 0 0 22px;
      line-height: 1.5;
    }

    .isPaused .timer,
    .isPaused .exercise {
      opacity: 0.55;
    }

    @media (max-width: 360px) {
      .exercise { font-size: 30px; }
      .card { padding: 18px; }
      .controls { grid-template-columns: 1fr; }
      button.ghost { grid-column: auto; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <header>
      <h1>Programme 2026</h1>
      <div class="progressText" id="progressText">0 / 0</div>
    </header>

    <div class="progressBar" aria-hidden="true">
      <div class="progressFill" id="progressFill"></div>
    </div>

    <section class="card" id="workoutCard">
      <div class="section" id="sectionName">—</div>
      <h2 class="exercise" id="exerciseName">Prêt ?</h2>
      <div class="meta" id="meta">Lance la séance.</div>

      <div class="timer" id="timer">00:00</div>

      <div class="repBox" id="repBox">
        <div class="repCount" id="repCount">—</div>
        <div class="repLabel" id="repLabel">répétitions</div>
      </div>

      <div class="controls">
        <button id="mainButton">Démarrer</button>
        <button class="secondary" id="pauseButton">Pause</button>
        <button class="secondary" id="nextButton">Suivant</button>
        <button class="danger" id="resetButton">Reset</button>
        <button class="ghost" id="skipSectionButton" style="display:none;">Passer le HIIT</button>
      </div>
    </section>

    <div class="next" id="nextBox">
      Suivant
      <strong id="nextExercise">—</strong>
    </div>

    <div class="smallGrid">
      <button class="secondary" data-jump="Échauffement">Échauff.</button>
      <button class="secondary" data-jump="Figure">Figure</button>
      <button class="secondary" data-jump="Exercices">Exos</button>
      <button class="secondary" data-jump="HIIT">HIIT</button>
      <button class="secondary" data-jump="Étirements">Étirements</button>
      <button class="secondary" id="wakeLockButton">Écran</button>
    </div>

    <section class="card doneScreen" id="doneScreen">
      <h2>Séance terminée</h2>
      <p>Programme complet validé.</p>
      <button id="restartButton">Recommencer</button>
    </section>
  </main>

  <script>
    const REST = "Repos";

    const steps = [
      // Échauffement — 5 sec entre chaque exercice
      timed("Échauffement", "Moulinets poignets", 30), rest("Échauffement", 5, "Repos transition"),
      timed("Échauffement", "Moulinets coude", 30), rest("Échauffement", 5, "Repos transition"),
      timed("Échauffement", "Moulinets épaule", 30), rest("Échauffement", 5, "Repos transition"),
      timed("Échauffement", "Torsions buste", 30), rest("Échauffement", 5, "Repos transition"),
      timed("Échauffement", "Extensions poignets", 30), rest("Échauffement", 5, "Repos transition"),
      timed("Échauffement", "Pompe", 30), rest("Échauffement", 5, "Repos transition"),
      timed("Échauffement", "Traction australienne", 30), rest("Échauffement", 5, "Repos transition"),
      timed("Échauffement", "Montées de jambes couchées", 30), rest("Échauffement", 5, "Repos transition"),
      timed("Échauffement", "Bateau", 30), rest("Échauffement", 5, "Repos transition"),
      timed("Échauffement", "Squat profond", 30), rest("Échauffement", 5, "Repos transition"),
      timed("Échauffement", "Fente cosaque", 30),
      rest("Échauffement", 60, "Repos fin échauffement"),

      // Figure
      manual("Figure", "Front Lever jambes pliées", "Série 1/3 — max"), rest("Figure", 90, "Repos 1:30"),
      manual("Figure", "Front Lever jambes pliées", "Série 2/3 — max"), rest("Figure", 90, "Repos 1:30"),
      manual("Figure", "Front Lever jambes pliées", "Série 3/3 — max"),
      rest("Figure", 60, "Repos fin figure"),

      // Exercices — 3 tours, pause tours 2 min, pause exos 15 sec
      ...rounds("Exercices", 3, 120, 15, [
        reps("Traction", "8 rep"),
        reps("Dips", "12 rep"),
        reps("Pistol squat", "8 rep par jambe"),
        reps("Relevé de jambes", "10 rep"),
        timedItem("Soulever du sol", 8),
        reps("Pompe", "20 rep"),
        timedItem("Gainage", 60)
      ]),
      rest("Exercices", 120, "Repos fin exercices"),

      // HIIT facultatif — 4 tours, pause tours 1 min, pause exos 15 sec
      marker("HIIT_START"),
      ...rounds("HIIT", 4, 60, 15, [
        reps("Burpee", "10 rep"),
        timedItem("Bateau", 30),
        reps("Jumping jack", "50 rep"),
        reps("Twist russe", "20 rep"),
        timedItem("Gainage côté gauche", 30),
        timedItem("Gainage côté droit", 30),
        reps("Mountain climber", "30 rep"),
        reps("Sit-up", "15 rep")
      ]),
      rest("HIIT", 120, "Repos fin HIIT"),
      marker("HIIT_END"),

      // Étirements
      timed("Étirements", "Hanche", 60, "Série 1/2"),
      timed("Étirements", "Hanche", 60, "Série 2/2"),
      timed("Étirements", "Squat profond", 30, "Série 1/3"),
      timed("Étirements", "Squat profond", 30, "Série 2/3"),
      timed("Étirements", "Squat profond", 30, "Série 3/3"),
      timed("Étirements", "Toucher ses pieds", 30, "Série 1/4"),
      timed("Étirements", "Toucher ses pieds", 30, "Série 2/4"),
      timed("Étirements", "Toucher ses pieds", 30, "Série 3/4"),
      timed("Étirements", "Toucher ses pieds", 30, "Série 4/4")
    ].filter(Boolean);

    function timed(section, name, seconds, note = "") {
      return { type: "time", section, name, seconds, note };
    }

    function timedItem(name, seconds) {
      return { mode: "time", name, seconds };
    }

    function reps(name, amount) {
      return { mode: "reps", name, amount };
    }

    function manual(section, name, note = "Valide quand terminé.") {
      return { type: "manual", section, name, note };
    }

    function rest(section, seconds, note = REST) {
      return { type: "time", section, name: REST, seconds, note, isRest: true };
    }

    function marker(id) {
      return { type: "marker", id };
    }

    function rounds(section, totalRounds, roundRest, exerciseRest, items) {
      const out = [];
      for (let r = 1; r <= totalRounds; r++) {
        items.forEach((item, i) => {
          if (item.mode === "time") {
            out.push(timed(section, item.name, item.seconds, `Tour ${r}/${totalRounds}`));
          } else {
            out.push({ type: "manual", section, name: item.name, note: `Tour ${r}/${totalRounds} — ${item.amount}`, reps: item.amount });
          }

          const isLastExercise = i === items.length - 1;
          const isLastRound = r === totalRounds;

          if (!isLastExercise) out.push(rest(section, exerciseRest, "Repos entre exercices"));
          if (isLastExercise && !isLastRound) out.push(rest(section, roundRest, "Repos entre tours"));
        });
      }
      return out;
    }

    const cleanSteps = steps.filter(s => s.type !== "marker");

    const app = document.getElementById("app");
    const workoutCard = document.getElementById("workoutCard");
    const doneScreen = document.getElementById("doneScreen");
    const sectionName = document.getElementById("sectionName");
    const exerciseName = document.getElementById("exerciseName");
    const meta = document.getElementById("meta");
    const timerEl = document.getElementById("timer");
    const repBox = document.getElementById("repBox");
    const repCount = document.getElementById("repCount");
    const repLabel = document.getElementById("repLabel");
    const mainButton = document.getElementById("mainButton");
    const pauseButton = document.getElementById("pauseButton");
    const nextButton = document.getElementById("nextButton");
    const resetButton = document.getElementById("resetButton");
    const skipSectionButton = document.getElementById("skipSectionButton");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const nextExercise = document.getElementById("nextExercise");
    const restartButton = document.getElementById("restartButton");
    const wakeLockButton = document.getElementById("wakeLockButton");

    let index = Number(localStorage.getItem("calisthenieIndex")) || 0;
    let remaining = 0;
    let interval = null;
    let started = false;
    let paused = false;
    let wakeLock = null;

    function current() {
      return cleanSteps[index];
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, "0");
      const s = Math.floor(seconds % 60).toString().padStart(2, "0");
      return `${m}:${s}`;
    }

    function render() {
      const step = current();

      if (!step) {
        showDone();
        return;
      }

      workoutCard.style.display = "block";
      doneScreen.style.display = "none";

      sectionName.textContent = step.section;
      exerciseName.textContent = step.name;
      meta.textContent = step.note || "";

      const isTimed = step.type === "time";
      timerEl.style.display = isTimed ? "block" : "none";
      repBox.style.display = isTimed ? "none" : "block";

      if (isTimed) {
        if (!started || remaining <= 0) remaining = step.seconds;
        timerEl.textContent = formatTime(remaining);
        mainButton.textContent = started ? "Continuer" : "Démarrer";
      } else {
        repCount.textContent = step.reps || "MAX";
        repLabel.textContent = step.reps ? "objectif" : "validation manuelle";
        mainButton.textContent = "Terminé";
      }

      pauseButton.textContent = paused ? "Reprendre" : "Pause";
      progressText.textContent = `${Math.min(index + 1, cleanSteps.length)} / ${cleanSteps.length}`;
      progressFill.style.width = `${(index / cleanSteps.length) * 100}%`;

      const next = cleanSteps[index + 1];
      nextExercise.textContent = next ? `${next.section} — ${next.name}` : "Fin";

      skipSectionButton.style.display = step.section === "HIIT" ? "block" : "none";
      app.classList.toggle("isPaused", paused);
      localStorage.setItem("calisthenieIndex", index);
    }

    function startTimer() {
      const step = current();
      if (!step || step.type !== "time") return;

      started = true;
      paused = false;
      clearInterval(interval);

      interval = setInterval(() => {
        if (paused) return;
        remaining--;
        timerEl.textContent = formatTime(Math.max(remaining, 0));

        if (remaining <= 0) {
          beep();
          nextStep();
        }
      }, 1000);

      render();
    }

    function nextStep() {
      clearInterval(interval);
      interval = null;
      started = false;
      paused = false;
      remaining = 0;
      index++;
      render();

      const step = current();
      if (step && step.type === "time" && step.isRest) {
        startTimer();
      }
    }

    function skipHiit() {
      const hiitEndIndex = cleanSteps.findIndex((s, i) => i > index && s.section !== "HIIT");
      if (hiitEndIndex !== -1) {
        clearInterval(interval);
        index = hiitEndIndex;
        started = false;
        paused = false;
        remaining = 0;
        render();
      }
    }

    function resetAll() {
      clearInterval(interval);
      interval = null;
      index = 0;
      started = false;
      paused = false;
      remaining = 0;
      localStorage.removeItem("calisthenieIndex");
      render();
    }

    function showDone() {
      clearInterval(interval);
      progressText.textContent = `${cleanSteps.length} / ${cleanSteps.length}`;
      progressFill.style.width = "100%";
      workoutCard.style.display = "none";
      doneScreen.style.display = "block";
      nextExercise.textContent = "—";
      localStorage.removeItem("calisthenieIndex");
    }

    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.04;
        osc.start();
        setTimeout(() => {
          osc.stop();
          ctx.close();
        }, 130);
      } catch (e) {}
    }

    async function toggleWakeLock() {
      if (!("wakeLock" in navigator)) {
        alert("Ton navigateur ne supporte pas le verrouillage d’écran.");
        return;
      }
      try {
        if (wakeLock) {
          await wakeLock.release();
          wakeLock = null;
          wakeLockButton.textContent = "Écran";
        } else {
          wakeLock = await navigator.wakeLock.request("screen");
          wakeLockButton.textContent = "Écran ON";
          wakeLock.addEventListener("release", () => {
            wakeLock = null;
            wakeLockButton.textContent = "Écran";
          });
        }
      } catch (e) {
        alert("Impossible de garder l’écran allumé.");
      }
    }

    mainButton.addEventListener("click", () => {
      const step = current();
      if (!step) return;
      if (step.type === "time") startTimer();
      else nextStep();
    });

    pauseButton.addEventListener("click", () => {
      if (!started) return;
      paused = !paused;
      render();
    });

    nextButton.addEventListener("click", nextStep);
    resetButton.addEventListener("click", resetAll);
    restartButton.addEventListener("click", resetAll);
    skipSectionButton.addEventListener("click", skipHiit);
    wakeLockButton.addEventListener("click", toggleWakeLock);

    document.querySelectorAll("[data-jump]").forEach(btn => {
      btn.addEventListener("click", () => {
        const section = btn.dataset.jump;
        const target = cleanSteps.findIndex(s => s.section === section);
        if (target >= 0) {
          clearInterval(interval);
          index = target;
          started = false;
          paused = false;
          remaining = 0;
          render();
        }
      });
    });

    document.addEventListener("visibilitychange", async () => {
      if (wakeLock && document.visibilityState === "visible") {
        try { wakeLock = await navigator.wakeLock.request("screen"); } catch (e) {}
      }
    });


    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }

    render();
  </script>
</body>
</html>
